<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — March Hotel ERP</title>
<style>
body{font-family:Arial, sans-serif;background:#f4f5f7;margin:0;display:flex;align-items:center;justify-content:center;height:100vh}
.login-box{background:#fff;padding:30px;border-radius:8px;width:320px;box-shadow:0 8px 30px rgba(0,0,0,.1)}
.login-title{font-size:18px;font-weight:700;margin-bottom:20px;text-align:center}
.fg{margin-bottom:12px}
.fg label{font-size:12px;color:#666;display:block;margin-bottom:4px}
.fg input{width:100%;padding:8px;border:1px solid #ccc;border-radius:4px}
.btn{width:100%;padding:10px;background:#5c7cfa;color:#fff;border:none;border-radius:4px;font-weight:600;cursor:pointer}
.btn:hover{background:#4c6ef5}
.err{color:#e03131;font-size:12px;margin-top:10px;text-align:center}
</style>
</head>
<body><div class="login-box">
  <div class="login-title">March Hotel ERP Login</div>
  <div class="fg">
    <label>Username</label>
    <input id="user" placeholder="Enter username">
  </div>
  <div class="fg">
    <label>Password</label>
    <input id="pass" type="password" placeholder="Enter password">
  </div>
  <button class="btn" onclick="login()">Login</button>
  <div id="err" class="err"></div>
</div><script>
function login(){
  const u=document.getElementById('user').value;
  const p=document.getElementById('pass').value;

  // simple demo auth
  if(u==='admin' && p==='admin123'){
    localStorage.setItem('erp_logged_in','1');
    window.location.href='march_hotel_v8.html'; // open prototype
  }else{
    document.getElementById('err').innerText='Invalid username or password';
  }
}
</script></body>
</html>
