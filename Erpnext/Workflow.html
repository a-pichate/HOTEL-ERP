<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>March Hotel ERP - Virtual Backend Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .erp-sidebar { width: 240px; background: #1a1c23; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .bg-clean { background: #dcfce7; color: #166534; }
        .bg-dirty { background: #fee2e2; color: #991b1b; }
        .bg-available { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .bg-occupied { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden font-sans">

    <aside class="erp-sidebar flex flex-col">
        <div class="p-6 border-b border-gray-700">
            <h1 class="text-xl font-bold tracking-tight">MARCH ERP</h1>
            <p class="text-gray-400 text-[10px] mt-1">VIRTUAL PROTOTYPE v1.2</p>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="switchTab('rooms')" class="w-full text-left p-2 hover:bg-gray-700 rounded text-sm">Room Dashboard</button>
            <button onclick="switchTab('folios')" class="w-full text-left p-2 hover:bg-gray-700 rounded text-sm">Guest Folios</button>
            <button onclick="switchTab('spa')" class="w-full text-left p-2 hover:bg-gray-700 rounded text-sm">Spa MTO Terminal</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-8">
            <h2 id="view-title" class="font-bold text-gray-700">Room Dashboard</h2>
            <div id="system-msg" class="text-sm font-medium transition-all duration-300"></div>
        </header>

        <div class="p-8 overflow-y-auto">
            
            <section id="tab-rooms" class="tab-content active">
                <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6" id="room-grid">
                    </div>
            </section>

            <section id="tab-folios" class="tab-content">
                <div class="bg-white rounded shadow-sm overflow-hidden border">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="p-4">Folio (SO)</th>
                                <th class="p-4">Guest</th>
                                <th class="p-4">Room</th>
                                <th class="p-4">State</th>
                                <th class="p-4">Balance</th>
                                <th class="p-4">Action</th>
                            </tr>
                        </thead>
                        <tbody id="folio-list"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-spa" class="tab-content">
                <div class="max-w-2xl bg-white p-6 rounded shadow border">
                    <h3 class="font-bold mb-4">New Spa Session (Officer MTO)</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Select Active Guest</label>
                            <select id="spa-guest-select" class="w-full border p-2 rounded text-sm mt-1"></select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Assign Officer (Vendor)</label>
                            <select id="spa-officer-select" class="w-full border p-2 rounded text-sm mt-1">
                                <option value="Sarah (Grade A)">Sarah (Grade A - ฿1,200/hr)</option>
                                <option value="Mike (Grade B)">Mike (Grade B - ฿800/hr)</option>
                            </select>
                        </div>
                        <button onclick="backend.createSpaSession()" class="bg-indigo-600 text-white px-4 py-2 rounded text-sm font-bold w-full">Complete Session & Auto-PO</button>
                    </div>
                    <div id="spa-logs" class="mt-6 text-[11px] font-mono text-gray-400 bg-gray-50 p-3 rounded">
                        // System Logs: Awaiting Session...
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script>
        /**
         * VIRTUAL DATABASE (State)
         */
        const DB = {
            rooms: [
                { id: '101', type: 'Deluxe', inv_status: 'Available', hk_status: 'Clean' },
                { id: '102', type: 'Deluxe', inv_status: 'Available', hk_status: 'Dirty' },
                { id: '103', type: 'Standard', inv_status: 'Occupied', hk_status: 'Clean', guest: 'John Doe' },
                { id: '104', type: 'Suite', inv_status: 'Available', hk_status: 'Clean' }
            ],
            folios: [
                { id: 'SO-001', guest: 'John Doe', room: '103', state: 'Checked-in', balance: 2500 }
            ],
            po_records: [] // Tracks MTO purchases for Officers
        };

        /**
         * VIRTUAL CONTROLLERS (Logic)
         */
        const backend = {
            
            // Logic: Check-in validation (Section 3 of design doc)
            checkIn: function(roomId) {
                const room = DB.rooms.find(r => r.id === roomId);
                
                // Requirement check: Available + Clean
                if (room.hk_status !== 'Clean') {
                    ui.notify("Error: Room must be CLEAN before check-in", "red");
                    return;
                }

                // Update Virtual DB
                room.inv_status = 'Occupied';
                room.guest = "Walk-in Guest";
                
                const newFolio = {
                    id: 'SO-' + Math.floor(Math.random() * 1000),
                    guest: room.guest,
                    room: room.id,
                    state: 'Checked-in',
                    balance: 1500
                };
                DB.folios.push(newFolio);

                ui.notify(`Check-in Successful for Room ${roomId}`, "green");
                ui.renderAll();
            },

            // Logic: Spa MTO Flow (Section 4.3 of design doc)
            createSpaSession: function() {
                const guestName = document.getElementById('spa-guest-select').value;
                const officer = document.getElementById('spa-officer-select').value;
                
                if (!guestName) { ui.notify("No guest selected", "red"); return; }

                // 1. Update Folio (Sales Order Line)
                const folio = DB.folios.find(f => f.guest === guestName);
                folio.balance += 800; // Charge guest

                // 2. MTO Trigger: Generate Purchase Order for Officer
                const poId = 'PO-' + Math.floor(Math.random() * 9000);
                DB.po_records.push({ po_id: poId, vendor: officer, amount: 400 });

                ui.notify("Spa Billed & PO Created", "indigo");
                document.getElementById('spa-logs').innerHTML += `<br>> [MTO] Generated ${poId} for ${officer}`;
                ui.renderAll();
            }
        };

        /**
         * FRONTEND UI LAYER
         */
        const ui = {
            renderAll: function() {
                this.renderRooms();
                this.renderFolios();
                this.updateSelects();
            },

            renderRooms: function() {
                const container = document.getElementById('room-grid');
                container.innerHTML = DB.rooms.map(room => `
                    <div class="bg-white p-4 rounded-lg shadow-sm border ${room.inv_status === 'Occupied' ? 'border-blue-300' : 'border-gray-200'}">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xl font-bold">${room.id}</span>
                            <span class="status-badge ${room.hk_status === 'Clean' ? 'bg-clean' : 'bg-dirty'}">${room.hk_status}</span>
                        </div>
                        <div class="text-xs text-gray-500 mb-4">${room.type}</div>
                        <div class="flex flex-col gap-2">
                            <div class="p-2 text-center text-xs rounded ${room.inv_status === 'Available' ? 'bg-available' : 'bg-occupied'} font-bold">
                                ${room.inv_status === 'Occupied' ? '👤 ' + room.guest : 'Available'}
                            </div>
                            ${room.inv_status === 'Available' ? 
                                `<button onclick="backend.checkIn('${room.id}')" class="bg-blue-600 text-white text-[10px] py-1 rounded font-bold uppercase hover:bg-blue-700">Check In</button>` 
                                : ''}
                        </div>
                    </div>
                `).join('');
            },

            renderFolios: function() {
                const container = document.getElementById('folio-list');
                container.innerHTML = DB.folios.map(f => `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-4 font-mono font-bold text-indigo-600">${f.id}</td>
                        <td class="p-4">${f.guest}</td>
                        <td class="p-4">Room ${f.room}</td>
                        <td class="p-4"><span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-[10px] font-bold">${f.state}</span></td>
                        <td class="p-4 font-bold">฿${f.balance.toLocaleString()}</td>
                        <td class="p-4"><button class="text-xs text-gray-400">Checkout</button></td>
                    </tr>
                `).join('');
            },

            updateSelects: function() {
                const select = document.getElementById('spa-guest-select');
                select.innerHTML = DB.folios.map(f => `<option value="${f.guest}">${f.guest} (Room ${f.room})</option>`).join('');
            },

            notify: function(msg, color) {
                const el = document.getElementById('system-msg');
                el.innerText = msg;
                el.className = `text-sm font-bold text-${color}-600`;
                setTimeout(() => { el.innerText = ''; }, 3000);
            }
        };

        // Navigation Controller
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('view-title').innerText = tabId.toUpperCase() + " Management";
        }

        // Initialize App
        ui.renderAll();
    </script>
</body>
</html>
