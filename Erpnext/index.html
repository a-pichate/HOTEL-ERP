<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARCH ERP | Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .sidebar-item.active { background: #0f172a; color: white; border-left: 4px solid #3b82f6; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 bg-slate-900 text-slate-400 flex flex-col shadow-2xl">
        <div class="p-8 text-white border-b border-slate-800">
            <h1 class="text-xl font-black tracking-tighter italic">MARCH <span class="text-blue-500 text-xs not-italic uppercase">Enterprise</span></h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <button onclick="Transaction.switchTab('rooms')" id="nav-rooms" class="sidebar-item w-full flex items-center p-4 rounded-xl active">
                <i class="fas fa-th-large w-6"></i><span class="font-bold ml-2">Front Desk</span>
            </button>
            <button onclick="Transaction.switchTab('spa')" id="nav-spa" class="sidebar-item w-full flex items-center p-4 rounded-xl">
                <i class="fas fa-spa w-6"></i><span class="font-bold ml-2">Spa Services (MTO)</span>
            </button>
            <button onclick="Transaction.switchTab('payouts')" id="nav-payouts" class="sidebar-item w-full flex items-center p-4 rounded-xl">
                <i class="fas fa-exchange-alt w-6"></i><span class="font-bold ml-2">Procurement/Payouts</span>
            </button>
            <button onclick="Transaction.switchTab('membership')" id="nav-membership" class="sidebar-item w-full flex items-center p-4 rounded-xl">
                <i class="fas fa-wallet w-6"></i><span class="font-bold ml-2">Member Ledger</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-20 bg-white border-b flex items-center justify-between px-10">
            <h2 id="view-title" class="text-2xl font-black text-slate-800 uppercase tracking-tight">Front Desk</h2>
            <div id="header-stats" class="flex space-y-0 space-x-6 text-[10px] font-black uppercase text-slate-400">
                <span>Revenue: <b id="stat-rev" class="text-slate-900">฿0</b></span>
                <span>Payouts: <b id="stat-pay" class="text-rose-600">฿0</b></span>
            </div>
        </header>

        <section id="tab-rooms" class="tab-content active p-10 overflow-y-auto">
            <div id="room-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>

        <section id="tab-spa" class="tab-content p-10">
            <div class="max-w-2xl mx-auto bg-white p-10 rounded-[40px] border shadow-sm">
                <h3 class="text-2xl font-black mb-6">Service Payout Mapping</h3>
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400">Select Guest Folio</label>
                        <select id="select-folio" class="w-full mt-2 p-4 bg-slate-50 border rounded-2xl font-bold"></select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400">Assign Therapist (Officer)</label>
                        <select id="select-officer" class="w-full mt-2 p-4 bg-slate-50 border rounded-2xl font-bold"></select>
                    </div>
                    <button onclick="Transaction.processSpaMTO()" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-blue-700 transition-all">Post Transaction</button>
                </div>
            </div>
        </section>

        <section id="tab-payouts" class="tab-content p-10">
            <div class="bg-white rounded-[40px] border shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b text-[10px] font-black uppercase text-slate-400">
                        <tr><th class="p-6">Reference</th><th class="p-6">Vendor</th><th class="p-6">Analytic</th><th class="p-6">Payout</th><th class="p-6">Status</th></tr>
                    </thead>
                    <tbody id="payout-table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-membership" class="tab-content p-10">
            <div id="member-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>
    </main>

    <div id="modal" class="modal">
        <div class="bg-white w-full max-w-lg p-12 rounded-[50px] shadow-2xl relative">
            <button onclick="Transaction.closeModal()" class="absolute top-8 right-8 text-slate-300 hover:text-slate-900"><i class="fas fa-times text-xl"></i></button>
            <div id="modal-content"></div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 right-10 px-8 py-4 rounded-2xl text-white font-black shadow-2xl opacity-0 transition-all pointer-events-none"></div>

    <script src="js/transaction_controller.js"></script>
</body>
</html>
